{% extends "layout.html" %}
{% block content %}
<div class="card">
    <div class="step-badge">Step 2</div>
    <h2 style="color: var(--secondary)"><i class="fas fa-closed-captioning"></i> AI Transcription</h2>
    
    <div class="card" style="background: rgba(0,0,0,0.2); border-left: 4px solid var(--secondary); box-shadow: none;">
        <h4 style="color: var(--text-main); margin-bottom: 5px;">Extracted Audio: <span style="color: var(--text-muted); font-weight: normal;">{{ current_file }}</span></h4>
        <audio controls style="width: 100%; border-radius: 8px; margin-top: 10px;">
            <source src="/data/extracted_audio/{{ current_file }}.wav" type="audio/wav">
        </audio>
    </div>

    <form action="/run_module2" method="POST" onsubmit="showLoading()">
        <input type="hidden" name="filename" value="{{ current_file }}">
        <button type="submit" id="procBtn" class="btn btn-gradient" style="width: 100%; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700;">
            <i class="fas fa-robot"></i> Start Whisper AI Transcription
        </button>
    </form>

    <div id="loader" style="display: none; text-align: center; margin-top: 30px; padding: 20px;">
        <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--secondary); margin-bottom: 15px;"></i>
        <p style="color: var(--text-main); font-weight: 500;">Whisper AI is generating high-accuracy subtitles...</p>
    </div>
</div>

<script>
    function showLoading() {
        document.getElementById('procBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
    }
</script>
{% endblock %}
