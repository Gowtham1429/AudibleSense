{% extends "layout.html" %}
{% block content %}
<div class="card">
    <div class="step-badge" style="color: var(--primary);">Step 3</div>
    <h2 style="color: var(--text-main)"><i class="fas fa-file-alt"></i> English Script</h2>
    
    <div style="background: rgba(15, 23, 42, 0.5); color: var(--text-muted); padding: 25px; border-radius: 12px; margin-bottom: 25px; font-family: 'Inter', monospace; border: 1px solid var(--glass-border); box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);">
        <h5 style="color: var(--text-main); margin-top: 0; font-size: 16px;">English Transcript:</h5>
        <pre style="white-space: pre-wrap; max-height: 250px; overflow-y: auto;">{{ transcription }}</pre>
    </div>

    <form action="/run_module3" method="POST">
        <input type="hidden" name="filename" value="{{ current_file }}">
        <p style="color: var(--text-main); font-weight: 500; margin-bottom: 15px;">Select target language for translation:</p>
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <select name="language" style="flex: 2; padding: 14px; border-radius: 10px; background: rgba(0,0,0,0.2); color: var(--text-main); border: 1px solid var(--glass-border);">
                <option value="hi" style="background: var(--bg-base); color: var(--text-main);">Hindi (हिन्दी)</option>
                <option value="te" style="background: var(--bg-base); color: var(--text-main);">Telugu (తెలుగు)</option>
                <option value="fr" style="background: var(--bg-base); color: var(--text-main);">French (Français)</option>
                <option value="ta" style="background: var(--bg-base); color: var(--text-main);">Tamil (தமிழ்)</option>
                <option value="kn" style="background: var(--bg-base); color: var(--text-main);">Kannada (ಕನ್ನಡ)</option>
            </select>
            <button type="submit" class="btn btn-primary" style="flex: 1;"><i class="fas fa-language"></i> Translate</button>
        </div>
    </form>
</div>
{% endblock %}
