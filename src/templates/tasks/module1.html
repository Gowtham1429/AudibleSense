{% extends "layout.html" %}
{% block content %}
<div class="card">
    <div class="step-badge">Step 1</div>
    <h2 style="color: var(--primary)"><i class="fas fa-video"></i> Video Extraction</h2>
    
    {% if error %}
    <div class="alert alert-error">
        <i class="fas fa-exclamation-triangle"></i> <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    <form action="/run_module1" method="POST" enctype="multipart/form-data" onsubmit="showLoading()">
        <div style="border: 2px dashed rgba(255,255,255,0.15); padding: 40px; text-align: center; border-radius: 12px; background: rgba(0,0,0,0.2);">
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px; font-size: 16px;">Select a local video file:</label>
                <input type="file" name="video_file" id="video_file">
            </div>
            
            <div style="margin: 25px 0; color: var(--text-muted); font-weight: 700; font-size: 14px;">&mdash; OR &mdash;</div>
            
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 10px; font-size: 16px;">Paste a YouTube URL:</label>
                <input type="text" name="youtube_url" id="youtube_url" placeholder="https://youtube.com/watch?v=...">
            </div>

            <p id="statusMsg" style="margin-top: 10px; margin-bottom: 25px; color: var(--text-muted);">Select an MP4 file or paste a YouTube URL to begin.</p>
            <button type="submit" id="mainBtn" class="btn btn-primary"><i class="fas fa-magic"></i> Extract Audio</button>
        </div>
    </form>
</div>

<script>
    function showLoading() {
        const fileInput = document.getElementById('video_file').files.length;
        const urlInput = document.getElementById('youtube_url').value.trim();
        
        if (fileInput === 0 && urlInput === "") {
            event.preventDefault();
            alert("Please either select a file OR paste a YouTube URL!");
            return;
        }

        document.getElementById('mainBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        if (urlInput !== "") {
            document.getElementById('statusMsg').innerText = "Downloading YouTube Video & Extracting Audio. This may take a minute...";
        } else {
            document.getElementById('statusMsg').innerText = "FFmpeg is extracting the audio stream. Please wait.";
        }
    }
</script>
{% endblock %}
